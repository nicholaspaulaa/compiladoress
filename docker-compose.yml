version: '3.8'

services:
  nginx:
    image: nginx:stable-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_URL: ${SUPABASE_URL:-}
        VITE_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
    expose:
      - "80"
    restart: on-failure

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "5000:5000"
    volumes:
      # PRD §14 — backend spawna containers sandbox via Docker socket
      - /var/run/docker.sock:/var/run/docker.sock
      # Diretorio compartilhado com o daemon (bind mounts para o runner)
      - sandbox_work:/sandbox-work
    depends_on:
      - runner_image_build
    environment:
      - FLASK_ENV=development
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY:-}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET:-}
      - COMPILE_TIMEOUT_S=${COMPILE_TIMEOUT_S:-15}
      - EXEC_TIMEOUT_S=${EXEC_TIMEOUT_S:-10}
      - DOCKER_STOP_TIMEOUT_S=${DOCKER_STOP_TIMEOUT_S:-12}
      - SANDBOX_IMAGE=simples-runner:latest
      - SANDBOX_WORK_DIR=/sandbox-work
    restart: on-failure

  # Pseudo-serviço apenas para construir a imagem do sandbox de execução
  # (PRD §14.4 — qemu-user-static para emulação i386 em hosts ARM64)
  runner_image_build:
    image: simples-runner:latest
    build:
      context: ./runner
      dockerfile: Dockerfile
    command: ["true"]     # sai imediatamente; só queremos a imagem construída
    restart: "no"

volumes:
  sandbox_work:
