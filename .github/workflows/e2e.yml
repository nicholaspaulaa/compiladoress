name: E2E Playwright

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
      - "backend/**"
      - "e2e/**"
      - "docker-compose.yml"
      - "nginx/**"
      - ".github/workflows/e2e.yml"

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Criar .env para docker compose
        run: |
          cat > .env <<EOF
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_JWT_SECRET=${{ secrets.SUPABASE_JWT_SECRET }}
          EXEC_TIMEOUT_S=10
          EOF

      - name: Subir stack (docker compose)
        run: docker compose up --build -d

      - name: Aguardar health check
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost/api/health; then
              exit 0
            fi
            sleep 5
          done
          docker compose logs
          exit 1

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Instalar dependencias E2E
        working-directory: e2e
        run: npm ci

      - name: Instalar Chromium (Playwright)
        working-directory: e2e
        run: npx playwright install chromium --with-deps

      - name: Executar testes E2E
        working-directory: e2e
        env:
          E2E_BASE_URL: http://localhost
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
        run: npm test

      - name: Upload relatorio Playwright
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

      - name: Encerrar stack
        if: always()
        run: docker compose down -v
